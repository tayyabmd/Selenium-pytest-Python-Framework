name: Selenium Pytest
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pytest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report
          path: reports/
          retention-days: 7
